<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Expense Dashboard</h1>
    </header>
    <main>
        <section id="statistics">
            <h2>Expense Statistics</h2>
            <p>Total Expenses: $5000</p>
            <p>Monthly Average: $416.67</p>
            <p>Categories: Food, Transport, Utilities</p>

        <section id="expense-list">
            <h2>Expense List</h2>
            <ul>
                <li>Food: $200</li>
                <li>Transport: $100</li>
                <li>Utilities: $50</li>

        </section>

    <footer>
        <p>&copy; 2026 Expense Tracker</p>
    </footer>
</body>
</html>
